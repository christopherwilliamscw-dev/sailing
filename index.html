<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piddinghoe Lake Sailing Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f0ec; font-family: sans-serif; padding: 8px; }
#gw { max-width: 920px; margin: 0 auto; }
canvas { display: block; width: 100%; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
#hud { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; align-items: center; }
.hc { background:#fff; border:0.5px solid #ddd; border-radius:7px; padding:4px 9px; font-size:12px; color:#666; }
.hc span { font-weight:600; color:#111; margin-left:3px; }
#hlap { border:0.5px solid #ddd; border-radius:7px; padding:4px 9px; font-size:12px; font-weight:700; color:#185fa5; background:#fff; }
#tip { background:#e6f1fb; border:0.5px solid #b5d4f4; border-radius:7px; padding:6px 10px; font-size:12px; color:#185fa5; margin-bottom:6px; min-height:30px; }
#ctl { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; align-items:center; }
.cg { display:flex; gap:4px; align-items:center; }
.cl { font-size:11px; color:#888; min-width:70px; }
button { font-family:inherit; font-size:12px; padding:5px 11px; border-radius:7px; border:0.5px solid #ccc; background:#fff; color:#111; cursor:pointer; }
button:hover { background:#f5f5f2; }
#cw { position:relative; }
#cw:fullscreen, #cw:-webkit-full-screen {
  display:flex; align-items:center; justify-content:center;
  background:#000; width:100vw; height:100vh;
}
#cw:fullscreen canvas, #cw:-webkit-full-screen canvas {
  border-radius:0;
  max-height:100vh; max-width:100vw;
  width:auto; height:auto;
  /* Preserve 900:660 aspect ratio — browser respects intrinsic size when width/height are auto */
  aspect-ratio: 900 / 660;
}
#mo { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(255,255,255,0.96); border:0.5px solid #ddd; border-radius:12px; padding:22px 30px; text-align:center; z-index:10; display:none; max-width:260px; }
#mo h3 { font-size:17px; font-weight:700; margin-bottom:6px; }
#mo p { font-size:13px; color:#666; margin-bottom:14px; line-height:1.5; }
#mo button { width:100%; }
</style>
</head>
<body>
<div id="gw">
  <div id="hud">
    <div id="hlap">Lap —/3</div>
    <div class="hc">Wind <span id="hw">from W</span></div>
    <div class="hc">Speed <span id="hs">0.0</span> kts</div>
    <div class="hc">Heading <span id="hh">0°</span></div>
    <div class="hc">Sail <span id="hsa">—</span></div>
    <div class="hc">Point of sail <span id="hp">—</span></div>
    <div class="hc">Next <span id="hn">—</span></div>
    <button onclick="toggleFS()" style="margin-left:auto">⛶ Full screen</button>
    <button onclick="resetGame()">↺ Restart</button>
  </div>
  <div id="tip">Head toward the start line and cross it heading WEST. Press H for hint.</div>
  <div id="cw">
    <canvas id="c" width="900" height="660"></canvas>
    <div id="mo"><h3 id="mt">🏆 Race complete!</h3><p id="mb"></p><button onclick="resetGame()">Race again</button></div>
  </div>
  <div id="ctl">
    <div class="cg"><span class="cl">Rudder (Z / X)</span>
      <button onmousedown="sT(-1)" onmouseup="eT()" ontouchstart="sT(-1)" ontouchend="eT()">◀ Port (Z)</button>
      <button onmousedown="sT(1)" onmouseup="eT()" ontouchstart="sT(1)" ontouchend="eT()">Stbd (X) ▶</button>
    </div>
    <div class="cg"><span class="cl">Sails (' / /)</span>
      <button onmousedown="sSh(-1)" onmouseup="eSh()" ontouchstart="sSh(-1)" ontouchend="eSh()">▲ Sheet in (' or ↓scroll)</button>
      <button onmousedown="sSh(1)" onmouseup="eSh()" ontouchstart="sSh(1)" ontouchend="eSh()">▼ Let out (/ or ↑scroll)</button>
    </div>
    <div class="cg"><span class="cl">H = course hint</span></div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=900,H=660;
const SC=0.5625,TL=3,MSA=4,MAX_SPD=5.5,NG=30; // SC=0.75*0.75 (25% smaller than before)
const HR=10; // hull radius — boat must stay this far from all shores

// ── WIND ──────────────────────────────────────────────────────────────────────
// windFrom = compass bearing wind blows FROM (e.g. 270 = westerly, wind comes from W)
// Downwind direction (where wind goes TO) = (windFrom + 180) % 360
let windFrom=270, windTarget=270, windShiftTimer=7;

function windDownDir(){ return (windFrom+180)%360; } // direction wind blows TOWARD (compass degrees)
// Canvas rotation convention: 0 = pointing right (+x), PI/2 = pointing down (+y)
// Compass bearing d → canvas angle = (d - 90) * PI/180
// e.g. compass 90° (East) → (90-90)*PI/180 = 0 → points right ✓
// e.g. compass 180° (South) → (180-90)*PI/180 = PI/2 → points down ✓
function windDownRad(){ return (windDownDir()-90)*Math.PI/180; }

function updateWind(dt){
  windShiftTimer-=dt;
  if(windShiftTimer<=0){
    let delta=(Math.random()-0.5)*20; // ±10°
    windTarget=270+clamp(windTarget-270+delta,-20,20);
    windTarget=clamp(windTarget,250,290);
    windShiftTimer=7+Math.random()*3-1.5;
  }
  // Smooth interpolation — full shift over ~4 seconds
  let diff=windTarget-windFrom;
  windFrom+=diff*Math.min(1,dt*0.5);

  let dir=Math.round(windFrom);
  const CD=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  document.getElementById('hw').textContent='from '+CD[Math.round(dir/22.5)%16]+' ('+dir+'°)';
}

// ── LAKE POLYGON ──────────────────────────────────────────────────────────────
// Left bank shifted left for more lake; no River Ouse (right = green land)
const LK=[
  {x:165,y:115},{x:188,y:90},{x:210,y:72},{x:268,y:55},{x:290,y:50},{x:318,y:58},
  {x:400,y:50},{x:510,y:48},{x:620,y:52},{x:705,y:62},
  {x:762,y:88},{x:808,y:138},{x:836,y:208},{x:846,y:298},{x:843,y:388},
  {x:831,y:462},{x:810,y:528},{x:776,y:573},{x:746,y:588},
  {x:680,y:590},{x:580,y:591},{x:480,y:590},{x:380,y:589},
  {x:290,y:588},{x:228,y:585},{x:200,y:580},
  {x:162,y:553},{x:168,y:508},{x:158,y:473},{x:168,y:438},{x:162,y:403},
  {x:172,y:368},{x:164,y:338},{x:175,y:303},{x:167,y:268},{x:178,y:233},
  {x:170,y:198},{x:178,y:163},{x:165,y:115}
];
const LK_N=LK.length;

function lkPath(){
  ctx.beginPath();
  LK.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.closePath();
}

// Point-in-polygon (ray casting)
function ptInLake(px,py){
  let inside=false;
  for(let i=0,j=LK_N-1;i<LK_N;j=i++){
    let xi=LK[i].x,yi=LK[i].y,xj=LK[j].x,yj=LK[j].y;
    if(((yi>py)!==(yj>py))&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

// ── ROBUST SHORE COLLISION ───────────────────────────────────────────────────
// Check 8 points around the hull perimeter to ensure WHOLE boat stays in lake
const CHECK_ANGLES=[0,45,90,135,180,225,270,315].map(a=>a*Math.PI/180);

function hullFullyInLake(cx,cy){
  if(!ptInLake(cx,cy)) return false;
  for(let a of CHECK_ANGLES){
    if(!ptInLake(cx+Math.cos(a)*HR, cy+Math.sin(a)*HR)) return false;
  }
  return true;
}

// Find the nearest point on each edge and push inward until hull fully fits
function resolveShoreCollision(nx,ny,ox,oy){
  // If hull is fully inside, no collision
  if(hullFullyInLake(nx,ny)) return{x:nx,y:ny,bounced:false};

  // Strategy: find closest edge, compute inward normal, push boat along it
  let bestDist=Infinity,bestCx=0,bestCy=0,bestNx=0,bestNy=0;
  for(let i=0;i<LK_N;i++){
    let j=(i+1)%LK_N;
    let ax=LK[i].x,ay=LK[i].y,bx=LK[j].x,by=LK[j].y;
    let edx=bx-ax,edy=by-ay,elen2=edx*edx+edy*edy;
    if(elen2<0.001) continue;
    let t=clamp(((nx-ax)*edx+(ny-ay)*edy)/elen2,0,1);
    let cx_=ax+t*edx,cy_=ay+t*edy;
    let d=Math.sqrt((nx-cx_)*(nx-cx_)+(ny-cy_)*(ny-cy_));
    if(d<bestDist){
      bestDist=d;
      bestCx=cx_;bestCy=cy_;
      // Perpendicular to edge — two options, pick one pointing toward lake centre (490,310)
      let enx=-edy,eny=edx;
      let el=Math.sqrt(enx*enx+eny*eny)||1;
      enx/=el;eny/=el;
      let toCx=490-cx_,toCy=310-cy_;
      if(enx*toCx+eny*toCy<0){enx=-enx;eny=-eny;}
      bestNx=enx;bestNy=eny;
    }
  }

  // Push boat inward along normal until hull fits — iterate up to 20 steps
  let px=nx,py=ny;
  for(let step=0;step<20;step++){
    px+=bestNx*2;py+=bestNy*2; // push 2px per step
    if(hullFullyInLake(px,py)) break;
  }
  // Final clamp: if still not inside after 20 steps, use old position
  if(!hullFullyInLake(px,py)){px=ox;py=oy;}
  return{x:px,y:py,bounced:true};
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// ── MARKS ─────────────────────────────────────────────────────────────────────
const S1={x:596,y:165,r:8};
const S2={x:720,y:315,r:8};
const BU={x:330,y:148,r:10};
const GR={x:535,y:476,r:10};
const AB=[S1,S2,BU,GR];

const LX_MID=(S1.x+S2.x)/2,LY_MID=(S1.y+S2.y)/2;
const L_DX=S2.x-S1.x,L_DY=S2.y-S1.y,L_LEN=Math.sqrt(L_DX*L_DX+L_DY*L_DY);
const L_NX=L_DY/L_LEN,L_NY=-L_DX/L_LEN;
function lineSideDot(x,y){return(x-LX_MID)*L_NX+(y-LY_MID)*L_NY;}
function lineParamT(x,y){return((x-S1.x)*L_DX+(y-S1.y)*L_DY)/(L_LEN*L_LEN);}
function boatBetweenBuoys(){let t=lineParamT(boat.x,boat.y);return t>-0.15&&t<1.15;}
function fullyWestOfLine(){return lineSideDot(boat.x,boat.y)<-HR;}
function fullyEastOfLine(){return lineSideDot(boat.x,boat.y)>HR;}

const PT_X1=205,PT_X2=750,PT_Y=573,PT_H=15;

let boat,keys={},tD=0,shD=0,parts=[],wArr=[];
let lap,leg,started,done,t0,lapTs,now;
let vx,vy,dA,lSide,lCD;
let hPath=[],hAlpha=0,hTimer=0;
let gW=0,gK=0,wPh=0;

function d2(a,b){let dx=b.x-a.x,dy=b.y-a.y;return Math.sqrt(dx*dx+dy*dy);}

function initBoat(){
  vx=0;vy=0;dA=0;gW=0;gK=0;wPh=0;
  return{x:285,y:555,head:350,spd:0,sa:45,ssa:0,trail:[]};
}
function resetGame(){
  boat=initBoat();keys={};tD=0;shD=0;parts=[];lap=0;leg=0;started=false;done=false;
  t0=null;lapTs=[];now=0;
  windFrom=270;windTarget=270;windShiftTimer=7;
  lSide=Math.sign(lineSideDot(boat.x,boat.y));lCD=0;
  hPath=[];hAlpha=0;hTimer=0;
  wArr=Array.from({length:32},()=>({
    x:170+Math.random()*660,y:58+Math.random()*515,
    ph:Math.random()*Math.PI*2,sp:0.4+Math.random()*0.45,
    off:Math.random()*20-10  // per-arrow phase offset for variation
  }));
  document.getElementById('mo').style.display='none';
  syncHUD();
  tip('Head toward the start line and cross it heading WEST. Press H for hint.');
  buildHint();
}
function toggleFS(){let w=document.getElementById('cw');document.fullscreenElement?document.exitFullscreen():w.requestFullscreen&&w.requestFullscreen();}

// ── NEXT TARGET ───────────────────────────────────────────────────────────────
function ntl(){if(!started)return'LINE';if(leg===1)return'①';if(leg===2)return'②';if(leg===3)return'LINE';if(leg===4)return'PINK';return'—';}
function ntc(){if(!started||leg===3||leg===4)return'#ff69b4';if(leg===1)return'#3399ff';if(leg===2)return'#22bb66';return'#fff';}
function nts(){if(!started)return'cross W';if(leg===1)return'windward';if(leg===2)return'leeward';if(leg===3)return'cross E';if(leg===4)return'round it';return'';}
function nll(){if(!started)return'Cross start line W';if(leg===1)return'Round blue ①';if(leg===2)return'Round green ②';if(leg===3)return'Cross line →';if(leg===4)return lap<TL?'Round pink → lap '+(lap+1):'Round pink → FINISH';return'—';}
function syncHUD(){document.getElementById('hn').textContent=nll();document.getElementById('hlap').textContent=started?'Lap '+lap+'/'+TL:'Lap —/'+TL;}
function tip(t){document.getElementById('tip').textContent=t;}

// ── SAILING PHYSICS ───────────────────────────────────────────────────────────
function sDiff(a,b){return((b-a)+540)%360-180;}
function awa(){return Math.abs(sDiff(boat.head,windFrom));}
function leeS(){return sDiff(boat.head,windFrom)>=0?-1:1;}
function flap(aw,sa){return aw<NG||sa>=aw;}
function optSA(aw){if(aw<=NG)return MSA+1;if(aw<=90)return 10+((aw-NG)/(90-NG))*20;if(aw<=150)return 30+((aw-90)/60)*30;return 60+((aw-150)/30)*20;}
function sailEff(aw,sa){if(flap(aw,sa))return 0;let o=optSA(aw);if(sa<=o)return 0.5+0.5*(sa/Math.max(o,1));let h=aw-o;return h>0?Math.max(0,1-(sa-o)/h):0;}
function pos(aw){if(aw<NG)return{n:'In irons!',f:0,c:'#e24b4a'};if(aw<50)return{n:'Close-hauled',f:.65,c:'#378add'};if(aw<80)return{n:'Close reach',f:.85,c:'#1d9e75'};if(aw<100)return{n:'Beam reach',f:1,c:'#639922'};if(aw<140)return{n:'Broad reach',f:.9,c:'#ba7517'};return{n:'Running',f:.7,c:'#d85a30'};}
function scl(s){let h=Math.round(Math.abs(s)/30);return s>=0?(6-h)+" o'clock":(6+h)+" o'clock";}
function near(b,e=50){let dx=boat.x-b.x,dy=boat.y-b.y;return Math.sqrt(dx*dx+dy*dy)<b.r+e;}

// ── ROUTE PLANNING ────────────────────────────────────────────────────────────
function hVec(h){let r=h*Math.PI/180;return{x:Math.sin(r),y:-Math.cos(r)};}
function dHead(a,b){let dx=b.x-a.x,dy=b.y-a.y;return((Math.atan2(dx,-dy)*180/Math.PI)+360)%360;}
function validH(h){return Math.abs(sDiff(h,windFrom))>=NG;}
function rInt(p1,d1,p2,d2){let det=d1.x*d2.y-d1.y*d2.x;if(Math.abs(det)<.0001)return null;let dx=p2.x-p1.x,dy=p2.y-p1.y;let t=(dx*d2.y-dy*d2.x)/det,s=(dx*d1.y-dy*d1.x)/det;return{t,s,x:p1.x+d1.x*t,y:p1.y+d1.y*t};}
function r2p(P,T){
  let h=dHead(P,T);if(validH(h))return[{x:T.x,y:T.y}];
  let cwp=(windFrom+38+360)%360,cws=(windFrom-38+360)%360;
  const VP=hVec(cwp),VS=hVec(cws);let c=[];
  let rA=rInt(P,VP,T,{x:-VS.x,y:-VS.y});if(rA&&rA.t>10&&rA.s>5){let tp={x:clamp(rA.x,170,840),y:clamp(rA.y,55,568)};c.push({tp,d:d2(P,tp)+d2(tp,T)});}
  let rB=rInt(P,VS,T,{x:-VP.x,y:-VP.y});if(rB&&rB.t>10&&rB.s>5){let tp={x:clamp(rB.x,170,840),y:clamp(rB.y,55,568)};c.push({tp,d:d2(P,tp)+d2(tp,T)});}
  if(!c.length){let tp={x:clamp(P.x+VP.x*150,170,840),y:clamp(P.y+VP.y*150,55,568)};return[{x:tp.x,y:tp.y,label:'tack'},{x:T.x,y:T.y}];}
  c.sort((a,b)=>a.d-b.d);return[{x:c[0].tp.x,y:c[0].tp.y,label:'tack'},{x:T.x,y:T.y}];
}
function lineWestTgt(){return{x:clamp(LX_MID-L_NX*50,170,840),y:clamp(LY_MID-L_NY*50,55,568)};}
function lineEastTgt(){return{x:clamp(LX_MID+L_NX*50,170,840),y:clamp(LY_MID+L_NY*50,55,568)};}
function stgs(){
  let st=[];
  function aL(l){
    st.push({lb:'① Blue',tg:{x:BU.x-20,y:BU.y+15},cl:'rgba(80,160,255,1)'});
    st.push({lb:'② Green',tg:{x:GR.x+20,y:GR.y+20},cl:'rgba(40,200,100,1)'});
    st.push({lb:'Cross line →',tg:lineEastTgt(),cl:'rgba(255,180,50,1)'});
    st.push({lb:l===TL?'FINISH!':'Round pink',tg:{x:S2.x+25,y:S2.y+10},cl:'rgba(255,140,200,1)'});
  }
  if(!started){st.push({lb:'Cross start ←',tg:lineWestTgt(),cl:'rgba(255,220,80,1)'});for(let l=1;l<=TL;l++)aL(l);}
  else{for(let l=lap;l<=TL;l++){if(l===lap){if(leg<=1)st.push({lb:'① Blue',tg:{x:BU.x-20,y:BU.y+15},cl:'rgba(80,160,255,1)'});if(leg<=2)st.push({lb:'② Green',tg:{x:GR.x+20,y:GR.y+20},cl:'rgba(40,200,100,1)'});if(leg<=3)st.push({lb:'Cross line →',tg:lineEastTgt(),cl:'rgba(255,180,50,1)'});if(leg<=4)st.push({lb:l===TL?'FINISH!':'Round pink',tg:{x:S2.x+25,y:S2.y+10},cl:'rgba(255,140,200,1)'});}else aL(l);}}
  return st;
}
function buildHint(){
  let st=stgs().slice(0,3),v=hVec(boat.head);
  let cm={x:clamp(boat.x+v.x*60,170,840),y:clamp(boat.y+v.y*60,55,568)};
  let p=[{x:boat.x,y:boat.y},{x:cm.x,y:cm.y,isC:true}],cur=cm;
  st.forEach((s,si)=>{let w=r2p(cur,s.tg);w.forEach((wp,wi)=>{wp.si=si;wp.col=s.cl;if(wi===w.length-1){wp.lb=s.lb;wp.isG=true;}});w.forEach(wp=>p.push(wp));cur=s.tg;});
  hPath=p;hTimer=5;hAlpha=1;
}

// ── COURSE LOGIC ──────────────────────────────────────────────────────────────
function adv(){
  if(!started){started=true;t0=Date.now();lap=1;leg=1;lCD=3;tip('Lap 1 started! Tack upwind to blue ①. H for route!');}
  else if(leg===1){leg=2;tip('Blue ① rounded! Reach down to green ②. H for route!');}
  else if(leg===2){leg=3;lCD=1.5;tip('Green ② rounded! Cross the line between the pink buoys!');}
  else if(leg===3){leg=4;lCD=2;tip('Line crossed! Round one pink buoy, then back to blue ①!');}
  else if(leg===4){
    let lt=((Date.now()-t0)/1000).toFixed(1);lapTs.push(lt);
    if(lap>=TL){done=true;let tot=(lapTs.reduce((a,b)=>a+parseFloat(b),0)).toFixed(1);document.getElementById('mt').textContent='🏆 Race complete!';document.getElementById('mb').innerHTML='<strong>Total: '+tot+'s</strong><br><br>'+lapTs.map((t,i)=>'Lap '+(i+1)+': '+t+'s').join('<br>');document.getElementById('mo').style.display='block';}
    else{t0=Date.now();lap++;leg=1;lCD=3;tip('Lap '+lap+' started! Back to blue ①. H for route!');}
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt){
  now+=dt;
  updateWind(dt);
  if(done)return;
  if(lCD>0)lCD-=dt;
  if(hTimer>0){hTimer-=dt;hAlpha=Math.max(0,hTimer/5);}

  if(keys['z']||keys['Z']||tD===-1)boat.head=(boat.head-60*dt+360)%360;
  if(keys['x']||keys['X']||tD===1)boat.head=(boat.head+60*dt)%360;
  if(keys["'"]||shD===-1)boat.sa=Math.max(MSA,boat.sa-28*dt);
  if(keys['/']||shD===1)boat.sa=Math.min(90,boat.sa+28*dt);

  let aw=awa(),ls=leeS(),fl=flap(aw,boat.sa);
  let tm=fl?Math.min(aw,90):boat.sa,ts=tm*ls;
  let pSSA=boat.ssa,sd=ts-boat.ssa,ms=300*dt;
  boat.ssa+=Math.abs(sd)<=ms?sd:Math.sign(sd)*ms;
  let pSg=pSSA===0?1:Math.sign(pSSA),nSg=boat.ssa===0?pSg:Math.sign(boat.ssa);
  if(pSg!==0&&nSg!==0&&pSg!==nSg&&awa()>140&&boat.sa>45){
    let kd=nSg>0?-1:1;gK+=kd*10;gW=1.8;wPh=0;boat.spd*=0.6;
    tip('⚠ Uncontrolled gybe! Sheet in before gybing!');
  }
  if(gW>0){
    gW-=dt;wPh+=dt*12;
    if(Math.abs(gK)>0){let step=Math.sign(gK)*Math.min(Math.abs(gK),50*dt);boat.head=(boat.head+step+360)%360;gK-=step;}
    boat.head=(boat.head+Math.sin(wPh)*8*(gW/1.8)*dt*3+360)%360;
  }

  let rm=Math.abs(boat.ssa),eff=sailEff(aw,rm),p=pos(aw);
  boat.spd+=(p.f*eff*MAX_SPD-boat.spd)*2*dt;
  boat.spd=Math.max(0,Math.min(MAX_SPD,boat.spd));
  let hr=boat.head*Math.PI/180;
  let pX=Math.sin(hr)*boat.spd*18,pY=-Math.cos(hr)*boat.spd*18;
  if(fl)dA=Math.min(dA+dt,10);else dA=Math.max(0,dA-dt*.5);
  let ds=(dA/10)*MAX_SPD*.20*18;
  vx+=(pX+ds-vx)*Math.min(1,4*dt);
  vy+=(pY-vy)*Math.min(1,4*dt);

  let nx=boat.x+vx*dt,ny=boat.y+vy*dt;
  let ox=boat.x,oy=boat.y;

  // Buoy collisions
  AB.forEach(b=>{
    let dx=nx-b.x,dy=ny-b.y,d=Math.sqrt(dx*dx+dy*dy)||.001,md=HR+b.r;
    if(d<md){
      let nnx=dx/d,nny=dy/d;nx=b.x+nnx*md;ny=b.y+nny*md;
      let vdn=vx*nnx+vy*nny;
      if(vdn<0){let e=.35;vx-=(1+e)*vdn*nnx;vy-=(1+e)*vdn*nny;boat.spd*=.25;dA=Math.min(dA+2,10);}
    }
  });

  // ── SHORE COLLISION — whole hull must stay in water ───────────────────────
  let res=resolveShoreCollision(nx,ny,ox,oy);
  if(res.bounced){
    // Reflect and damp velocity
    vx*=-0.25;vy*=-0.25;
    boat.spd*=0.35;
    dA=Math.min(dA+1,10);
  }
  boat.x=res.x;boat.y=res.y;

  // Line crossing
  let newSide=Math.sign(lineSideDot(boat.x,boat.y));
  let justCrossed=(newSide!==lSide&&lSide!==0&&newSide!==0);
  if(newSide!==0)lSide=newSide;

  if(!started){if(justCrossed&&newSide<0&&boatBetweenBuoys()&&fullyWestOfLine())adv();}
  else if(leg===1){if(near(BU))adv();}
  else if(leg===2){if(near(GR))adv();}
  else if(leg===3&&lCD<=0){if(justCrossed&&newSide>0&&boatBetweenBuoys()&&fullyEastOfLine())adv();}
  else if(leg===4&&lCD<=0){if(near(S1,35)||near(S2,35))adv();}

  syncHUD();

  // Trail
  let tl=boat.trail[boat.trail.length-1];
  if(tl&&tl!==null&&(Math.abs(boat.x-tl.x)>W/2||Math.abs(boat.y-tl.y)>H/2))boat.trail.push(null);
  boat.trail.push({x:boat.x,y:boat.y});
  if(boat.trail.length>600)boat.trail.shift();

  // Wake particles
  if(boat.spd>.5&&Math.random()<.3){
    let sx=Math.sin(hr+Math.PI),sy=-Math.cos(hr+Math.PI);
    parts.push({x:boat.x+sx*12+(Math.random()-.5)*6,y:boat.y+sy*12+(Math.random()-.5)*6,vx:sx*(.8+Math.random()*1.2),vy:sy*(.8+Math.random()*1.2),life:1,decay:.03+Math.random()*.025});
  }
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;return p.life>0;});

  // Wind arrows move in the direction the wind is blowing TO (downwind direction)
  // windFrom = where wind comes FROM, so wind travels toward (windFrom+180)
  // Movement vector: wind blows toward windDownDir (compass), convert to canvas dx/dy
  // compass bearing → dx=sin(bearing*PI/180), dy=-cos(bearing*PI/180)
  let wBearing=windDownDir()*Math.PI/180;
  let wadx=Math.sin(wBearing),wady=-Math.cos(wBearing);
  wArr.forEach(a=>{
    a.x+=wadx*a.sp*18*dt;
    a.y+=wady*a.sp*18*dt;
    a.ph+=dt;
    if(a.x<165)a.x=840;if(a.x>840)a.x=165;
    if(a.y<55)a.y=580;if(a.y>580)a.y=55;
  });

  document.getElementById('hs').textContent=boat.spd.toFixed(1);
  document.getElementById('hh').textContent=Math.round(boat.head)+'°';
  document.getElementById('hsa').textContent=scl(boat.ssa);
  let p2=pos(aw),pe=document.getElementById('hp');pe.textContent=p2.n;pe.style.color=p2.c;
}

function drawWindSock(){
  // Wind sock: above clubhouse
  // Pole base at (96, 592) — top of the bottom land strip
  // Moving UP by sock total height (pole + sock) ≈ 80px from last version
  // So base at y=530 (well above the pontoon, visible on lake edge)
  const sx=96, sy=530;
  const poleH=36;       // 1.5× of previous 24px pole

  // Pole
  ctx.save();
  ctx.strokeStyle='rgba(60,45,20,.95)';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx,sy-poleH);ctx.stroke();

  // Wind sock streams downwind from the pole top
  // windFrom = where wind comes FROM → sock tip points AWAY from that (downwind)
  // In canvas: rotation = windDownRad() but sock hangs from pole so orient from pole top
  // Wind sock streams downwind — tip points toward windDownDir

  const sockLen=48;    // 1.5× of previous 32px
  const sockR0=10.5;   // open end radius (1.5× of 7)
  const sockR1=4.5;    // tip radius (1.5× of 3)
  const nStripes=4;

  ctx.translate(sx, sy-poleH);  // move to pole top

  // Ripple: sock sways gently ±5° at its tip based on time
  // Each stripe also ripples slightly with a phase offset
  let rippleAmp=5*Math.PI/180; // ±5°
  let rippleBase=Math.sin(now*2.5)*rippleAmp; // gentle sway

  ctx.restore(); // back to base state before applying correct canvas angle
  ctx.save();
  ctx.translate(sx, sy-poleH);

  let canvasAngle = windDownRad(); // now correctly = (windDownDir-90)*PI/180

  // Draw each stripe as a slightly rippled trapezoid
  for(let i=0;i<nStripes;i++){
    let t0=i/nStripes, t1=(i+1)/nStripes;
    let r0=sockR0+(sockR1-sockR0)*t0;
    let r1=sockR0+(sockR1-sockR0)*t1;
    let x0=t0*sockLen, x1=t1*sockLen;

    // Each stripe gets a small additional ripple offset
    let ripple=rippleBase*(1+t0*1.5); // more ripple at tip

    ctx.save();
    ctx.rotate(canvasAngle + ripple);
    ctx.fillStyle=(i%2===0)?'#ff7700':'#f8f8f8';
    ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=0.6;
    ctx.beginPath();
    ctx.moveTo(x0,-r0);ctx.lineTo(x1,-r1);
    ctx.lineTo(x1,r1);ctx.lineTo(x0,r0);
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.restore();
  }

  // Open-end ring at pole top
  ctx.save();ctx.rotate(canvasAngle);
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,0,sockR0,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Pole tip dot
  ctx.fillStyle='rgba(60,45,20,.8)';
  ctx.beginPath();ctx.arc(0,0,2.5,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // Label
  ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='7px sans-serif';ctx.textAlign='center';
  ctx.fillText('wind',sx,sy+10);
}

function drawBoat(){
  let wF=gW/1.8,hc=gW>0?(Math.sin(now*18)>0?'#ff6600':'#cc2200'):'#cc2200';
  let vW=gW>0?Math.sin(wPh)*6*wF:0;
  ctx.save();ctx.translate(boat.x,boat.y);ctx.rotate((boat.head+vW)*Math.PI/180);ctx.scale(SC,SC);
  ctx.beginPath();ctx.moveTo(0,-40);ctx.bezierCurveTo(20,-18,22,8,18,28);ctx.lineTo(-18,28);ctx.bezierCurveTo(-22,8,-20,-18,0,-40);ctx.closePath();
  ctx.fillStyle=hc;ctx.strokeStyle='#881100';ctx.lineWidth=2.5;ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-38);ctx.lineTo(0,24);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1.3;ctx.stroke();
  const MY=-24;ctx.beginPath();ctx.arc(0,MY,3,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  const SL=52;let aw=awa(),ls=leeS(),ssa=boat.ssa,fl=flap(aw,boat.sa),sr=ssa*Math.PI/180,fx=Math.sin(sr)*SL,fy=MY+Math.cos(sr)*SL;
  if(fl){
    let steps=16,dfp=Math.abs(Math.abs(ssa)-Math.min(aw,90)),amp=(2+dfp*.12)*Math.abs(Math.sin(now*10));
    let dx=fx,dy=fy-MY,len=Math.sqrt(dx*dx+dy*dy)||1,px=(-dy/len)*ls,py=(dx/len)*ls;
    ctx.beginPath();
    for(let i=0;i<=steps;i++){let t=i/steps,ix=fx*t,iy=MY+(fy-MY)*t,w=Math.sin(t*Math.PI*3+now*12)*amp;i===0?ctx.moveTo(ix+px*w,iy+py*w):ctx.lineTo(ix+px*w,iy+py*w);}
    ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=6;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  } else {
    let eff=sailEff(aw,Math.abs(ssa)),belly=Math.sign(ssa)*(5+Math.abs(ssa)*.22)*Math.max(.15,eff),cpx=fx*.5+belly,cpy=(MY+fy)*.5;
    ctx.beginPath();ctx.moveTo(0,MY);ctx.quadraticCurveTo(cpx,cpy,fx,fy);
    ctx.strokeStyle='white';ctx.lineWidth=6;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  }
  ctx.restore();
  if(dA>.5){
    let fr=dA/10;ctx.save();ctx.translate(boat.x,boat.y);let dl=26*fr;
    ctx.globalAlpha=.65*fr;ctx.strokeStyle='#88ccff';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(dl,0);ctx.moveTo(dl-4,-3);ctx.lineTo(dl,0);ctx.lineTo(dl-4,3);ctx.stroke();ctx.restore();
  }
}

function drawCompass(){
  let cx=52,cy=52,r=34;ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.stroke();
  ['N','E','S','W'].forEach((d,i)=>{
    let a=i*Math.PI/2-Math.PI/2;ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=d==='N'?'#ff8080':'rgba(255,255,255,.6)';ctx.fillText(d,Math.cos(a)*24,Math.sin(a)*24);
  });
  // Boat heading needle
  ctx.save();ctx.rotate(boat.head*Math.PI/180-Math.PI/2);
  ctx.beginPath();ctx.moveTo(26,0);ctx.lineTo(-9,0);ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  // Wind arrow on compass: points FROM windFrom direction (into centre) — i.e. shows where wind comes from
  // Arrow should point in the direction the wind is blowing TO (downwind), same as sock and water arrows
  ctx.save();ctx.rotate(windDownRad());
  ctx.beginPath();ctx.moveTo(-21,0);ctx.lineTo(7,0);ctx.moveTo(2,-5);ctx.lineTo(7,0);ctx.lineTo(2,5);
  ctx.strokeStyle='rgba(120,210,255,.85)';ctx.lineWidth=2;ctx.stroke();ctx.restore();
  ctx.font='8px sans-serif';ctx.fillStyle='rgba(120,210,255,.6)';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('wind',0,r+4);
  ctx.restore();
}

function drawNT(){
  let lb=ntl(),co=ntc(),sb=nts(),pu=.85+.15*Math.sin(now*3),bx=W-82,by=97,bw=68,bh=68;
  ctx.save();ctx.fillStyle='rgba(0,0,0,.48)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
  ctx.strokeStyle=co;ctx.lineWidth=3;ctx.globalAlpha=pu;ctx.beginPath();ctx.roundRect(bx+2,by+2,bw-4,bh-4,6);ctx.stroke();
  ctx.globalAlpha=.72;ctx.fillStyle='rgba(255,255,255,.72)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('NEXT',bx+bw/2,by+6);
  ctx.globalAlpha=pu;ctx.fillStyle=co;let fs=lb.length>2?17:30;ctx.font='bold '+fs+'px sans-serif';ctx.textBaseline='middle';ctx.fillText(lb,bx+bw/2,by+bh/2+4);
  ctx.globalAlpha=.6;ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='8px sans-serif';ctx.textBaseline='bottom';ctx.fillText(sb,bx+bw/2,by+bh-4);ctx.restore();
}
function drawLI(){
  if(!started)return;
  let el=t0?((Date.now()-t0)/1000).toFixed(1):'0.0';
  ctx.save();ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.roundRect(W-162,8,154,24,5);ctx.fill();
  ctx.font='bold 12px sans-serif';ctx.fillStyle='rgba(255,255,255,.9)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Lap '+lap+'/'+TL+'  ·  '+el+'s',W-85,20);
  lapTs.forEach((t,i)=>{ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.roundRect(W-162,36+i*20,154,18,4);ctx.fill();ctx.font='11px sans-serif';ctx.fillStyle='rgba(180,220,180,.9)';ctx.fillText('Lap '+(i+1)+': '+t+'s',W-85,36+i*20+9);});
  if(gW>0){ctx.fillStyle='rgba(255,80,0,'+(gW/1.8*.7)+')';ctx.beginPath();ctx.roundRect(W/2-95,H/2-20,190,36,6);ctx.fill();ctx.font='bold 14px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚠ Uncontrolled gybe!',W/2,H/2-2);}
  ctx.restore();
}
function drawPOS(){
  let aw=awa(),fl=flap(aw,boat.sa),p=pos(aw),lb=fl?'Sail flapping!':p.n,co=fl?'#e24b4a':p.c;
  let x=W-122,y=H-26,w=116,h=19;ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(x,y,w,h,5);ctx.fill();
  ctx.font='11px sans-serif';ctx.fillStyle=co;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lb,x+w/2,y+h/2);
}

let lastT=0;
function render(t){
  let dt=Math.min((t-lastT)/1000,.05);lastT=t;
  update(dt);
  ctx.clearRect(0,0,W,H);
  drawBG();
  drawLake(t/1000);
  drawNoGoZone();
  drawWindArrows();
  drawHint();
  drawTrail();drawParts();
  drawPontoonAndBoats();
  drawBuoys();
  drawBoat();
  drawCompass();
  drawWindSock();
  drawLI();drawNT();drawPOS();
  let dlg=started?(lap-1)*4+(leg-1):0,pr=Math.max(0,Math.min(1,dlg/(TL*4)));
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.roundRect(W/2-100,H-18,200,10,4);ctx.fill();
  ctx.fillStyle='#22bb66';ctx.beginPath();ctx.roundRect(W/2-100,H-18,200*pr,10,4);ctx.fill();
  ctx.font='10px sans-serif';ctx.fillStyle='rgba(255,255,255,.5)';ctx.textAlign='center';ctx.textBaseline='top';
  let ln=['—','Blue ①','Green ②','Cross line','Pink'];
  ctx.fillText('Lap '+(started?lap:'—')+' — '+(started?ln[leg]:'Start'),W/2,H-6);
  requestAnimationFrame(render);
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(["'",'/','z','Z','x','X'].includes(e.key))e.preventDefault();
  if(e.key==='h'||e.key==='H'){e.preventDefault();buildHint();}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.deltaY>0)boat.sa=Math.max(MSA,boat.sa-6);else boat.sa=Math.min(90,boat.sa+6);
},{passive:false});
function sT(d){tD=d;}function eT(){tD=0;}function sSh(d){shD=d;}function eSh(){shD=0;}
resetGame();requestAnimationFrame(render);
</script>
